title: sangminwoo
description: 'blog for deeplearning'
url: "https://sangminwoo.github.io"

navbar-links:
  About: "aboutme"
  Contents: 
    - Papers: "papers"
    - CS231N: "cs231n"
    - CS224N: "cs224n"
    - Glossary: "glossary"
  GitHub: "https://github.com/sangminwoo"

avatar: "/img/my_pic.jpg"

# If you want to have an image logo in the top-left corner instead of the title text,
# then specify the following parameter
title-img: /img/home.png

# Personalize the colors in your website. Colour values can be any valid CSS colour
navbar-col: "#F5F5F5"
navbar-text-col: "#404040"
navbar-children-col: "#F5F5F5"
page-col: "#FFFFFF"
link-col: "#008AFF"
hover-col: "#0085A1"
footer-col: "#F5F5F5"
footer-text-col: "#777777"
footer-link-col: "#404040"

navbar-img: "/img/concrete-texture.png"
footer-img: "/img/concrete-texture.png"
# page-img: "/img/bgimage.png"

# --- Footer options --- #
author:
  name: Sangmin Woo

social-network-links:
  rss: true
  email: "shmwoo9395@gmail.com"
  github: sangminwoo

# Select which share links to show in posts
share-links-active:
  twitter: true
  facebook: true
  google: false
  linkedin: true

# How to display the link to the website in the footer
# Remove this if you don't want a link in the footer
# url-pretty: "sangminwoo.com"  # eg. "deanattali.com/beautiful-jekyll"

disqus: "sangminwoo-disqus-com"

staticman:
  repository : # GitHub username/repository eg. "daattali/beautiful-jekyll"
  branch     : # eg. "master" If you're not using `master` branch, then you also need to update the `branch` parameter in `staticman.yml`
  endpoint   : # URL of your own deployment (with trailing slash) (will fallback to a public GitLab instance)
  reCaptcha:
    # reCaptcha for Staticman (OPTIONAL)
    # If you use reCaptcha, you must also set these parameters in staticman.yml
    siteKey  : # Use your own site key, you need to apply for one on Google
    secret   : # ENCRYPT your password by going to https://staticman3.herokuapp.com/v3/encrypt/<your-site-secret>

# Excerpt Word Length
# Truncates the excerpt to the specified number of words on the index page
excerpt_length: 50

# Character used to separate site title and description in HTML document title
# and RSS feed title
title-separator: "-"

# Output options (more information on Jekyll's site)
timezone: "America/Vancouver"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
# paginate: 5
# paginate_path: "/posts/page:num/"

kramdown:
  input: GFM

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true  # add comments to all blog posts
      social-share: true # add social media sharing buttons to all blog posts
  -
    scope:
      path: "" # all files
    values:
      layout: "page"
      show-avatar: false

link-tags: true

exclude:
  - CHANGELOG.md
  - CNAME
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - Vagrantfile
  - appveyor.yml
  - tools/

gist:
  noscript: false

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist